services:
  backend:
    build:
      context: ./services/backend
      dockerfile: Dockerfile
      args:
        PORT: ${BACKEND_PORT}
    container_name: dgvam-backend
    env_file:
      - ./.env
    environment:
      DB_HOST: db
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./services/web
      dockerfile: Dockerfile
      args:
        PORT: ${WEB_PORT}
    container_name: dgvam-web
    env_file:
      - ./.env
    ports:
      - "${WEB_PORT}:${WEB_PORT}"
    depends_on:
      - backend
    restart: unless-stopped

  admin:
    build:
      context: ./services/admin
      args:
        PORT: ${ADMIN_PORT}
    container_name: dgvam-admin
    env_file:
      - ./.env
    ports:
      - "${ADMIN_PORT}:${ADMIN_PORT}"
    depends_on:
      - backend
    restart: unless-stopped

  broker:
    build:
      context: ./services/broker
      args:
        PORT: ${BROKER_PORT}
    container_name: dgvam-broker
    env_file:
      - ./.env
    ports:
      - "${BROKER_PORT}:${BROKER_PORT}"
    depends_on:
      - backend
    restart: unless-stopped

  db:
    image: mysql:8.4
    container_name: dgvam-db
    env_file:
      - ./.env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3308:3306"
    volumes:
      - dgvam-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  dgvam-db-data:
